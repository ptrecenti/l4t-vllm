services:
  vllm-server:
    image: ghcr.io/nvidia-ai-iot/vllm:latest-jetson-orin
    container_name: vllm-server
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - $HOME/.cache/huggingface:/data/models/huggingface
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - VLLM_API_KEY=${VLLM_API_KEY}
    command: ["python", "-m", "vllm.entrypoints.openai.api_server", "--model", "Kbenkhaled/Qwen3.5-27B-quantized.w4a16", "--served-model-name", "qwen-thinker", "--port", "8000", "--trust-remote-code", "--max-num-seqs","1","--max-num-batched-tokens","2048","--kv-cache-dtype","fp8", "--max-model-len", "200000", "--gpu-memory-utilization", "0.82","--block-size","16", "--reasoning-parser", "qwen3", "--enable-auto-tool-choice", "--tool-call-parser", "qwen3_coder", "--enable-prefix-caching", "--mm-encoder-tp-mode", "data", "--mm-processor-cache-type", "shm", "--api-key", "${VLLM_API_KEY}"]
